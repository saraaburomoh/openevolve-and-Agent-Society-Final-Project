# OpenEvolve Configuration — Final Project Co-Evolution
max_iterations: 50
checkpoint_interval: 5
log_level: "INFO"
random_seed: 42

# Evolution strategy
diff_based_evolution: false
language: "text"
max_code_length: 20000

# LLM for mutating the agents
llm:
  models:
    - name: "minimaxai/minimax-m2.7"
      weight: 1.0
  api_base: "https://integrate.api.nvidia.com/v1"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.7
  max_tokens: 4096
  timeout: 120
  retries: 3
  retry_delay: 30

# Prompt configuration
prompt:
  system_message: |
    You are an expert multi-agent systems architect specializing in Dual-Axis Classification and Co-Evolution.

    The crew uses a Dual-Axis framework. The persona_classifier extracts both a USER ARCHETYPE and an ITEM QUALITY VERDICT
    using an explicit, hardcoded taxonomy inside the agent's backstory. The prediction_modeler then uses these
    dual-axis classifications to calibrate star ratings and review text (e.g. using item thresholds when user data is missing).

    MUTATION DIRECTIVES:
    - You are explicitly encouraged to invent entirely new, complex behavioral profiles (e.g., "TREND_FOLLOWER" or "PRICE_SENSITIVE") in the taxonomy.
    - You may invent new variables to add to the Review DNA extraction.
    - You are encouraged to alter the exact mathematical formulas for the ITEM QUALITY VERDICT THRESHOLDS to find the optimal statistical split.
    - You are encouraged to invent new "CASES" for complex edge conditions (e.g., CASE D: What if the business is DECLINING_QUALITY but the user is a GENEROUS_RATER?).
    - You may design complex heuristic formulas or decision trees to mathematically weigh User DNA vs. Item Sentiment.
    - Introduce cognitive biases (like Recency Bias or Bandwagon Effect) into the calibration rules if it helps accuracy.

    Your goal: mutate the agent configurations (roles, goals, and specifically the ARCHETYPE TAXONOMY in the backstory)
    to discover which archetype definitions, labels, or quality thresholds yield the most accurate predictions.
    You may redefine the types of users or the types of items, or adjust the rating thresholds.

    HARD RULES:
    Do NOT change the YAML keys (persona_classifier, prediction_modeler).
    Do NOT use markdown code blocks like ```yaml ... ``` in your output. Just return raw YAML.
    Do NOT remove the EVOLVE-BLOCK-START or EVOLVE-BLOCK-END markers.
    Do NOT change the llm: field values.
  num_top_programs: 3
  num_diverse_programs: 2
  include_artifacts: false

# Database configuration
database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7
  migration_interval: 10
  migration_rate: 0.1
  feature_dimensions:
    - "complexity"
    - "diversity"

# Evaluator configuration
evaluator:
  timeout: 900
  max_retries: 2
  parallel_evaluations: 1
  cascade_evaluation: false
