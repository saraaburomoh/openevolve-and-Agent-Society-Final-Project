# Configuration for blind_minimization example
# Uses NVIDIA NIM endpoint (OpenAI-compatible)
max_iterations: 10
checkpoint_interval: 5

# LLM configuration - using NVIDIA NIM endpoint
llm:
  primary_model: "meta/llama-3.3-70b-instruct"
  primary_model_weight: 0.8
  secondary_model: "meta/llama-3.3-70b-instruct"
  secondary_model_weight: 0.2
  api_base: "https://integrate.api.nvidia.com/v1"
  temperature: 0.7
  max_tokens: 8000
  timeout: 120

# Prompt configuration
prompt:
  system_message: |
    You are an expert programmer specializing in numerical optimization algorithms.

    Your task is to improve a BLIND function minimization algorithm.
    "Blind" means: you do NOT know the true global minimum location.
    You only know that lower function values are better.

    The target function is:
      f(x, y) = sin(x) * cos(y) + sin(x*y) + (x^2 + y^2) / 20
    Search space: x, y in [-5, 5]

    The evaluator scores your algorithm RELATIVELY:
      - If you find a LOWER value than the current population best -> high score
      - If you find a HIGHER value -> low score
    No absolute coordinates are used for scoring.

    Focus on:
      1. Escaping local minima (perturbation, random restarts, multi-start)
      2. Efficient exploration vs exploitation trade-off
      3. Reliability across multiple runs (5 trials, 5-second timeout each)

    The function signature you must keep:
      def search_algorithm(func, bounds=(-5, 5), iterations=1000) -> (best_x, best_y, best_value)

    The 'func' argument is the target function — call it as func(x, y).
    Do NOT hardcode the function formula inside search_algorithm.

# Database configuration (MAP-Elites)
database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7
  similarity_threshold: 0.99

# Evaluator configuration
evaluator:
  timeout: 60
  parallel_evaluations: 1

# Evolution settings
diff_based_evolution: false
cascade_evaluation: false
max_code_length: 20000
